<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dán ảnh</title>
  </head>
  <body style="margin: 0">
    <div id="wrap" style="display: flex; flex-direction: column; align-items: stretch">
      <button
        type="button"
        id="read-btn"
        style="
          font-family: system-ui, -apple-system, sans-serif;
          font-size: 13px;
          font-weight: 700;
          padding: 10px 14px;
          border-radius: 9999px;
          border: 1px solid rgba(255, 255, 255, 0.12);
          background: #005bc4;
          color: #fff;
          cursor: pointer;
          width: 100%;
          box-sizing: border-box;
        "
      >
        Đọc ảnh từ clipboard
      </button>
    </div>
    <script>
      (function () {
        var readBtn = document.getElementById("read-btn");
        var MAX_SIDE = 2048;
        var JPEG_Q = 0.88;
        var enableGlobalPaste = true;
        var boundToParent = false;

        function post(msg) {
          window.parent.postMessage(msg, "*");
        }

        post({
          isStreamlitMessage: true,
          type: "streamlit:componentReady",
          apiVersion: 1,
        });

        function setFrameH(h) {
          post({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: h });
        }
        setFrameH(52);

        function sendToStreamlit(dataUrl) {
          if (!dataUrl || typeof dataUrl !== "string" || dataUrl.indexOf("data:image") !== 0) return;
          resizeToJpegDataUrl(dataUrl, function (out) {
            post({
              isStreamlitMessage: true,
              type: "streamlit:setComponentValue",
              value: out,
            });
          });
        }

        function resizeToJpegDataUrl(dataUrl, done) {
          var img = new Image();
          img.onload = function () {
            var w = img.width;
            var h = img.height;
            var m = Math.max(w, h);
            var scale = m > MAX_SIDE ? MAX_SIDE / m : 1;
            var nw = Math.max(1, Math.round(w * scale));
            var nh = Math.max(1, Math.round(h * scale));
            var c = document.createElement("canvas");
            c.width = nw;
            c.height = nh;
            var ctx = c.getContext("2d");
            if (!ctx) {
              done(dataUrl);
              return;
            }
            ctx.drawImage(img, 0, 0, nw, nh);
            try {
              done(c.toDataURL("image/jpeg", JPEG_Q));
            } catch (e) {
              done(dataUrl);
            }
          };
          img.onerror = function () {
            done(dataUrl);
          };
          img.src = dataUrl;
        }

        function shouldIgnorePasteTarget(t) {
          if (!t || typeof t.closest !== "function") return false;
          if (t.closest("[data-testid='stChatInput']")) return true;
          if (t.closest("[data-testid='stTextInput']")) return true;
          if (t.closest("[data-testid='stTextArea']")) return true;
          if (t.closest("[data-testid='stCode']")) return true;
          var el = t.nodeType === 3 ? t.parentElement : t;
          while (el && el.nodeType === 1) {
            var tag = el.tagName;
            if (tag === "TEXTAREA") return true;
            if (tag === "INPUT") {
              var typ = (el.getAttribute("type") || "text").toLowerCase();
              if (
                typ === "checkbox" ||
                typ === "radio" ||
                typ === "button" ||
                typ === "submit" ||
                typ === "reset" ||
                typ === "file" ||
                typ === "range" ||
                typ === "color" ||
                typ === "hidden"
              ) {
                el = el.parentElement;
                continue;
              }
              return true;
            }
            if (el.getAttribute && el.getAttribute("contenteditable") === "true") return true;
            if (el.isContentEditable) return true;
            el = el.parentElement;
          }
          return false;
        }

        function tryConsumeImagePaste(e) {
          var cd = e.clipboardData;
          if (!cd || !cd.items) return false;
          for (var i = 0; i < cd.items.length; i++) {
            var it = cd.items[i];
            if (it.type.indexOf("image") === -1) continue;
            e.preventDefault();
            e.stopPropagation();
            var blob = it.getAsFile();
            if (!blob) continue;
            var r = new FileReader();
            r.onload = function (ev) {
              sendToStreamlit(ev.target.result);
            };
            r.readAsDataURL(blob);
            return true;
          }
          return false;
        }

        function onPasteCapture(e) {
          if (shouldIgnorePasteTarget(e.target)) return;
          tryConsumeImagePaste(e);
        }

        /* Trang Streamlit (parent): Ctrl+V mọi nơi — chỉ bắt khi clipboard có ảnh. */
        function bindOrUnbindGlobalPaste() {
          try {
            var pw = window.parent;
            if (!pw || pw === window || !pw.document) return;
            if (enableGlobalPaste && !boundToParent) {
              pw.document.addEventListener("paste", onPasteCapture, true);
              boundToParent = true;
            }
            if (!enableGlobalPaste && boundToParent) {
              pw.document.removeEventListener("paste", onPasteCapture, true);
              boundToParent = false;
            }
          } catch (err) {
            /* sandbox / cross-origin: chỉ còn nút clipboard.read */
          }
        }
        bindOrUnbindGlobalPaste();

        /* Fallback khi focus còn trong iframe component. */
        window.addEventListener("paste", onPasteCapture, true);

        // Nhận args từ Streamlit để bật/tắt global paste.
        window.addEventListener("message", function (event) {
          var d = event && event.data;
          if (!d || d.isStreamlitMessage !== true) return;
          if (d.type !== "streamlit:render") return;
          var args = d.args;
          if (typeof args === "string") {
            try {
              args = JSON.parse(args);
            } catch (e) {
              args = null;
            }
          }
          if (args && typeof args === "object" && Object.prototype.hasOwnProperty.call(args, "enable_global_paste")) {
            enableGlobalPaste = !!args.enable_global_paste;
            bindOrUnbindGlobalPaste();
          }
        });

        readBtn.addEventListener("click", function () {
          if (!navigator.clipboard || !navigator.clipboard.read) {
            alert("Trình duyệt không hỗ trợ đọc clipboard — dùng Ctrl+V trên trang (ngoài ô nhập chữ).");
            return;
          }
          navigator.clipboard
            .read()
            .then(async function (items) {
              for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var types = item.types || [];
                for (var j = 0; j < types.length; j++) {
                  var type = types[j];
                  if (type.indexOf("image/") !== 0) continue;
                  try {
                    var blob = await item.getType(type);
                    var dataUrl = await new Promise(function (resolve, reject) {
                      var r = new FileReader();
                      r.onload = function () {
                        resolve(r.result);
                      };
                      r.onerror = reject;
                      r.readAsDataURL(blob);
                    });
                    sendToStreamlit(dataUrl);
                    return;
                  } catch (e) {}
                }
              }
              alert("Clipboard hiện không có ảnh — hãy copy ảnh hoặc chụp màn hình rồi thử lại.");
            })
            .catch(function () {
              alert("Không đọc được clipboard (cần HTTPS và quyền). Thử Ctrl+V trên trang.");
            });
        });
      })();
    </script>
  </body>
</html>
